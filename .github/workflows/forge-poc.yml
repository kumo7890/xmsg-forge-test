name: Forge PoC — Xmsg Sender Forgery

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  forge-poc:
    name: ORMP Port-Layer Auth Bypass PoC
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install dependencies
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub CI"
          forge install foundry-rs/forge-std --no-commit

      - name: Run unit tests (no RPC needed)
        run: |
          forge test --match-test "testPayloadAlignment" -vvvv || true

      - name: Confirm ORMP relay on-chain
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
        run: |
          echo "Confirming relay: 0x13b2211a7cA45Db2808F6dB05557ce5347e3634e"
          cast call 0x2cd1867fb8016f93710B6386f7f9F1D540A60812 \
            "ormp()(address)" \
            --rpc-url "$ETH_RPC_URL" || \
            echo "WARNING: relay read failed — check ETH_RPC_URL secret"

      - name: Confirm registered peer for Arbitrum (chainId 42161)
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
        run: |
          echo "Confirming peer for chainId 42161 (Arbitrum)"
          cast call 0x2cd1867fb8016f93710B6386f7f9F1D540A60812 \
            "peerOf(uint256)(address)" 42161 \
            --rpc-url "$ETH_RPC_URL" || \
            echo "WARNING: peer read failed — check ETH_RPC_URL secret"

      - name: Run fork tests (mainnet) — CRITICAL PoC
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
        run: |
          forge test \
            --match-test "testForge_ORMPPort" \
            --fork-url "$ETH_RPC_URL" \
            -vvvv